- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    ~/.zshrc:
    ~/.zprofile:
    ~/.git-completion.bash:
    ~/.gitconfig:
    ~/.gitconfig.local.example:
    ~/.gitignore_global:
    # iterm2 integration https://iterm2.com/documentation-shell-integration.html
    ~/.iterm2_shell_integration.bash:
    ~/.oh-my-zsh/themes/lib:
      create: true
      path: oh-my-zsh/themes/lib
    ~/.oh-my-zsh/themes/dracula.zsh-theme:
      path: oh-my-zsh/themes/dracula.zsh-theme
    ~/.config/opencode/opencode.json:
      path: config/opencode/opencode.json
    ~/.config/opencode/skills:
      create: true
      path: config/opencode/skills
    ~/.agents:
      create: true
      path: agents
    ~/.config/opencode/AGENTS.md:
      path: config/opencode/AGENTS.md
    ~/.config/opencode/opencode-notifier.json:
      path: config/opencode/opencode-notifier.json
    ~/.config/opencode/caveman.json:
      path: config/opencode/caveman.json
    ~/.pi:
      create: true
      path: pi

    # brew install television
    ~/.config/television/cable:
      create: true
      path: config/television/cable
    ~/.binnys:
      path: binnys
    ~/Library/Application Support/autowt/config.toml:
      create: true
      path: Library/Application Support/autowt/config.toml
    ~/Library/Application Support/com.mitchellh.ghostty/config:
      create: true
      path: Library/Application Support/com.mitchellh.ghostty/config
    
    ~/.cronjobs:
      create: true
      path: cronjobs

- create:
  - ~/.oh-my-zsh
  - ~/.ssh
  - ~/code
  - ~/.nvm
  - ~/.config/opencode
  - ~/.binnys

- shell:
  - [git submodule update --init --recursive, Installing submodules]
